name: Deploy AICrew Studio

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aicrew-production
  cancel-in-progress: false

permissions:
  contents: read

# 服务端部署：next build（服务端模式）→ PM2 next start（127.0.0.1:3101）→ nginx 反代 /aicrew。
# 应用含 app/api/* 服务端路由，不再静态导出。逻辑对齐 scripts/deploy-server.ps1。
# 必需 GH secrets：AICREW_SSH_PRIVATE_KEY、AICREW_PRODUCTION_ENV（完整 .env 内容）。
# 可选 secrets（有默认值）：AICREW_DEPLOY_HOST、AICREW_DEPLOY_USER、AICREW_DOMAIN。
jobs:
  build-and-deploy:
    name: Build and deploy (server mode)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_VERSION: "24"
      DEPLOY_HOST: ${{ secrets.AICREW_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.AICREW_DEPLOY_USER }}
      DOMAIN: ${{ secrets.AICREW_DOMAIN }}
      SSH_PRIVATE_KEY: ${{ secrets.AICREW_SSH_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set deployment defaults
        run: |
          set -euo pipefail
          echo "DEPLOY_HOST=${DEPLOY_HOST:-47.253.230.197}" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=${DEPLOY_USER:-root}" >> "$GITHUB_ENV"
          echo "DOMAIN=${DOMAIN:-songuu.top}" >> "$GITHUB_ENV"
          echo "RELEASE_ROOT=/opt/aicrew/releases" >> "$GITHUB_ENV"
          echo "CURRENT_LINK=/opt/aicrew/current-server" >> "$GITHUB_ENV"
          echo "APP_NAME=aicrew-studio" >> "$GITHUB_ENV"
          echo "APP_HOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "APP_PORT=3101" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (server mode)
        run: npm run build

      - name: Write production env
        run: |
          set -euo pipefail
          if [ -z "${AICREW_PRODUCTION_ENV}" ]; then
            echo "::error::Missing required GitHub secret AICREW_PRODUCTION_ENV (完整 .env 内容)"
            exit 1
          fi
          printf '%s\n' "${AICREW_PRODUCTION_ENV}" > .env
          for key in AICREW_AI_BASE_URL AICREW_AI_API_KEY AICREW_AI_TEXT_MODEL; do
            grep -q "^${key}=" .env || { echo "::error::AICREW_PRODUCTION_ENV 缺少 ${key}"; exit 1; }
          done
          echo "Production .env written (values masked)."
        env:
          AICREW_PRODUCTION_ENV: ${{ secrets.AICREW_PRODUCTION_ENV }}

      - name: Build self-check
        run: |
          set -euo pipefail
          test -d .next
          test -d .next/server
          test -f app/api/ai/config/route.ts
          test -f app/api/ai/generate/route.ts

      - name: Package server release
        run: |
          set -euo pipefail
          rm -rf .next/cache
          archive="${RUNNER_TEMP}/aicrew-server-${GITHUB_SHA}.tgz"
          items="app components lib styles .next package.json package-lock.json next.config.mjs tsconfig.json next-env.d.ts .env"
          if [ -d public ]; then items="${items} public"; fi
          tar -czf "${archive}" ${items}
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"
          echo "REMOTE_ARCHIVE=/tmp/aicrew-server-${GITHUB_SHA}.tgz" >> "$GITHUB_ENV"
          echo "REMOTE_RELEASE=${RELEASE_ROOT}/aicrew-server-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::Missing required GitHub secret AICREW_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/aicrew_deploy_key
          chmod 600 ~/.ssh/aicrew_deploy_key
          ssh-keyscan -T 10 -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          set -euo pipefail
          scp -i ~/.ssh/aicrew_deploy_key -o BatchMode=yes \
            "${ARCHIVE}" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_ARCHIVE}"

      - name: Remote release + PM2 restart (atomic swap)
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/aicrew_deploy_key -o BatchMode=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "RELEASE_ROOT='${RELEASE_ROOT}' CURRENT_LINK='${CURRENT_LINK}' REMOTE_ARCHIVE='${REMOTE_ARCHIVE}' REMOTE_RELEASE='${REMOTE_RELEASE}' APP_NAME='${APP_NAME}' APP_HOST='${APP_HOST}' APP_PORT='${APP_PORT}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          export HOSTNAME="${APP_HOST}"
          export PORT="${APP_PORT}"

          DEPLOY_SWITCHED=0
          trap 'rm -f "${REMOTE_ARCHIVE}"; if [ "${DEPLOY_SWITCHED}" != "1" ]; then rm -rf "${REMOTE_RELEASE}"; fi' EXIT

          mkdir -p "${RELEASE_ROOT}"
          rm -rf "${REMOTE_RELEASE}"
          mkdir -p "${REMOTE_RELEASE}"
          tar -xzf "${REMOTE_ARCHIVE}" -C "${REMOTE_RELEASE}"
          test -f "${REMOTE_RELEASE}/.env"
          chmod 600 "${REMOTE_RELEASE}/.env"
          cd "${REMOTE_RELEASE}"

          # 复用上一个 release 的 node_modules：完整 lockfile 相同，或生产运行依赖未变化。
          runtime_deps_match() {
            node -e '
              const fs = require("fs");
              const [currentPath, releasePath] = process.argv.slice(1);
              const pick = (root) => {
                const pkg = JSON.parse(fs.readFileSync(`${root}/package.json`, "utf8"));
                return JSON.stringify({
                  dependencies: pkg.dependencies || {},
                  optionalDependencies: pkg.optionalDependencies || {},
                  peerDependencies: pkg.peerDependencies || {},
                  overrides: pkg.overrides || {}
                });
              };
              process.exit(pick(currentPath) === pick(releasePath) ? 0 : 1);
            ' "${CURRENT_LINK}" "${REMOTE_RELEASE}"
          }

          if [ -d "${CURRENT_LINK}/node_modules" ] && { cmp -s "${CURRENT_LINK}/package-lock.json" "${REMOTE_RELEASE}/package-lock.json" || runtime_deps_match; }; then
            cp -a "${CURRENT_LINK}/node_modules" "${REMOTE_RELEASE}/node_modules"
            echo "Reused current node_modules"
          else
            npm ci --omit=dev --no-audit --no-fund
          fi

          # 原子切换 current-server 符号链接。
          ln -sfn "${REMOTE_RELEASE}" "${CURRENT_LINK}.next"
          mv -Tf "${CURRENT_LINK}.next" "${CURRENT_LINK}"
          DEPLOY_SWITCHED=1

          # PM2 启动/重启（首次注入 HOSTNAME/PORT；重启用 --update-env 继承当前 env）。
          if pm2 describe "${APP_NAME}" >/dev/null 2>&1; then
            pm2 restart "${APP_NAME}" --update-env
          else
            pm2 start npm --name "${APP_NAME}" --cwd "${CURRENT_LINK}" -- start
          fi
          pm2 save

          rm -f "${REMOTE_ARCHIVE}"

          # 保留最近 5 个 release，清理更早的（current 指向最新，不会被删）。
          ls -1dt "${RELEASE_ROOT}"/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf

          echo "CURRENT_SERVER=$(readlink -f "${CURRENT_LINK}")"
          echo "PM2_STATUS=$(pm2 describe "${APP_NAME}" | grep -E 'status' | head -1 || true)"
          REMOTE_SCRIPT

      - name: Verify production
        run: |
          set -euo pipefail
          # 1) 直连应用端口（绕过 nginx），确认 AI 服务端配置已加载。
          direct="$(ssh -i ~/.ssh/aicrew_deploy_key -o BatchMode=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "curl -fsS 'http://${APP_HOST}:${APP_PORT}/aicrew/api/ai/config/'")"
          echo "${direct}" | grep -q '"configured":true'
          echo "AI config route verified (app port)"

          # 2) 公网（经 nginx）核心路由 200。
          for path in /aicrew/ /aicrew/canvas/ /aicrew/workbench/; do
            code="$(curl -k -L -s -o /dev/null -w '%{http_code}' "https://${DOMAIN}${path}")"
            echo "public https://${DOMAIN}${path} -> ${code}"
            test "${code}" = "200"
          done
          curl -k -L -s "https://${DOMAIN}/aicrew/" | grep -q 'AICrew Studio'
          echo "public gateway verified"
